<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Sports Trivia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #1e1e2f;
      padding: 25px;
      border-radius: 10px;
    }

    h1 {
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .category-btn {
      background: #4caf50;
      color: white;
    }

    .answer-btn {
      background: #2196f3;
      color: white;
    }

    .next-btn {
      background: #ff9800;
      color: black;
      display: none;
    }

    .score {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🏆 All Sports Trivia</h1>

  <!-- CATEGORY SCREEN -->
  <div id="categories">
    <p>Select a category:</p>
    <button class="category-btn" onclick="startCategory('football')">🏈 Football</button>
    <button class="category-btn" onclick="startCategory('basketball')">🏀 Basketball</button>
    <button class="category-btn" onclick="startCategory('soccer')">⚽ Soccer</button>
    <button class="category-btn" onclick="startCategory('baseball')">⚾ Baseball</button>
    <button class="category-btn" onclick="startCategory('general')">🏅 General Sports</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz" style="display:none;">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <div class="score" id="score"></div>
  </div>
</div>

<script>
const data = {
  football: [
    { q: "How many players are on the field per team?", a: ["9","10","11","12"], c: 2 },
    { q: "How many points is a touchdown worth?", a: ["3","6","7","8"], c: 1 },
    { q: "What position throws the ball?", a: ["QB","RB","WR","LB"], c: 0 }
  ],
  basketball: [
    { q: "How many players on the court per team?", a: ["4","5","6","7"], c: 1 },
    { q: "How many points is a 3‑pointer?", a: ["2","3","4","5"], c: 1 },
    { q: "What league is the NBA?", a: ["College","Pro","High School","Street"], c: 1 }
  ],
  soccer: [
    { q: "How many players per team on the field?", a: ["9","10","11","12"], c: 2 },
    { q: "What part of the body can't touch the ball?", a: ["Head","Chest","Feet","Hands"], c: 3 },
    { q: "What is a soccer goal worth?", a: ["1","2","3","4"], c: 0 }
  ],
  baseball: [
    { q: "How many strikes for an out?", a: ["2","3","4","5"], c: 1 },
    { q: "How many bases are there?", a: ["3","4","5","6"], c: 1 },
    { q: "What position throws most pitches?", a: ["Catcher","Pitcher","Shortstop","Outfielder"], c: 1 }
  ],
  general: [
    { q: "How many Olympic rings are there?", a: ["4","5","6","7"], c: 1 },
    { q: "What sport uses a shuttlecock?", a: ["Tennis","Badminton","Ping Pong","Squash"], c: 1 },
    { q: "Which sport has touchdowns?", a: ["Basketball","Baseball","Football","Hockey"], c: 2 }
  ]
};

let category = [];
let index = 0;
let score = 0;

function startCategory(cat) {
  category = data[cat];
  index = 0;
  score = 0;
  document.getElementById("categories").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  loadQuestion();
}

function loadQuestion() {
  document.getElementById("nextBtn").style.display = "none";
  const q = category[index];
  document.getElementById("question").textContent = q.q;

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  q.a.forEach((text, i) => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.textContent = text;
    btn.onclick = () => checkAnswer(i);
    answers.appendChild(btn);
  });
}

function checkAnswer(i) {
  if (i === category[index].c) score++;
  document.getElementById("score").textContent =
    `Score: ${score} / ${category.length}`;
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  index++;
  if (index < category.length) {
    loadQuestion();
  } else {
    document.getElementById("quiz").innerHTML =
      `<h2>Finished!</h2>
       <p>Your Score: ${score} / ${category.length}</p>
       <button onclick="location.reload()">Play Again</button>`;
  }
}
</script>

</body>
</html>
